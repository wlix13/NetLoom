name: "Feature request"
description: "Have an idea for new topology capability, CLI command, or template? Share it here."
labels:
  - feature

body:
  - id: description
    type: textarea
    validations:
      required: true
    attributes:
      label: "Describe the feature"
      description: "What should NetLoom be able to do? Be specific about the behavior — a new CLI command, a topology YAML field, a new template type, etc."

  - id: use-case
    type: textarea
    validations:
      required: true
    attributes:
      label: "What lab scenario requires this?"
      description: "Describe the network topology or workflow that motivated this request. A concrete example (even a rough YAML snippet) helps a lot."
      placeholder: |
        I'm building a topology with 3 routers running BGP and I need...

  - id: component
    type: dropdown
    attributes:
      label: "Which component does this relate to?"
      options:
        - CLI (new command or option)
        - Schema (new topology YAML field or node type)
        - Templates (new or updated Jinja2 templates)
        - Core (controller or internal model change)
        - Not sure

  - id: alternatives
    type: textarea
    attributes:
      label: "Alternatives or workarounds"
      description: "Is there a way to achieve this today, even if inconvenient?"
