name: "Bug report"
description: "Something not working as expected? Help reproduce and fix it."
labels:
  - bug

body:
  - id: description
    type: textarea
    validations:
      required: true
    attributes:
      label: "Describe the bug"
      description: "What went wrong? Briefly describe the unexpected behavior or error."

  - id: command
    type: textarea
    validations:
      required: true
    attributes:
      label: "Command used"
      description: "The exact `netloom` command that triggered the issue."
      placeholder: "netloom --topology lab.yaml up"

  - id: topology
    type: textarea
    attributes:
      label: "Topology YAML (if relevant)"
      description: "Paste the relevant portion of your topology file. Redact any sensitive values."
      render: yaml

  - id: actual
    type: textarea
    validations:
      required: true
    attributes:
      label: "Actual output"
      description: "Paste the full error message or unexpected output."
      render: shell

  - id: expected
    type: textarea
    validations:
      required: true
    attributes:
      label: "Expected behavior"
      description: "What should have happened instead?"

  - id: version
    type: input
    attributes:
      label: "NetLoom version"
      description: "Output of `netloom --version`."

  - id: environment
    type: input
    attributes:
      label: "Environment"
      description: "OS and VirtualBox version (e.g. Ubuntu 24.04, VirtualBox 7.1)."
